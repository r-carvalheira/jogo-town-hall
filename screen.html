<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Town Hall — Ecrã Principal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f3;
  --surface: #ffffff;
  --surface2: #eef0eb;
  --border: rgba(0,0,0,0.08);
  --green: #1a6644;
  --green2: #228c5a;
  --green-light: #e8f4ee;
  --text: #1a2b1f;
  --muted: #6b856f;
  --amber: #c97a00;
  --red: #c0392b;
  --gold: #f5a623;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

#phase-waiting, #phase-quiz, #phase-game, #phase-podium { display: none; width: 100vw; height: 100vh; }
.active-phase { display: flex !important; }

/* ───── WAITING ───── */
#phase-waiting {
  flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
  background: var(--bg);
}
.waiting-title { font-size: 3.5rem; font-weight: 700; color: var(--green); letter-spacing: -0.03em; }
.waiting-sub { font-size: 1.1rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.qr-box {
  width: 180px; height: 180px; background: var(--surface); border: 2px solid var(--border);
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; text-align: center; padding: 1rem;
}
.player-count { font-size: 1rem; font-family: 'DM Mono', monospace; color: var(--muted); }
.player-count span { color: var(--green); font-weight: 700; font-size: 1.4rem; }
.player-list { display: flex; flex-wrap: wrap; gap: 8px; max-width: 700px; justify-content: center; }
.player-chip {
  padding: 6px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 999px; font-size: 0.85rem; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from { opacity:0; transform: scale(0.6); } to { opacity:1; transform: scale(1); } }

/* ───── KAHOOT QUIZ ───── */
#phase-quiz {
  flex-direction: column; padding: 1.4rem 1.6rem; gap: 0.9rem;
  background: #1a1a2e;
}
.kq-topbar {
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.kq-round-label {
  font-family: 'DM Mono', monospace; font-size: 0.85rem; color: rgba(255,255,255,0.5);
}
.kq-voted-pill {
  background: rgba(255,255,255,0.12); color: #fff;
  font-family: 'DM Mono', monospace; font-size: 0.8rem;
  padding: 4px 14px; border-radius: 999px; transition: background 0.3s;
}
.kq-voted-pill.all { background: rgba(52,211,99,0.25); color: #4ade80; }
.kq-question-card {
  background: #fff; border-radius: 16px; padding: 1.2rem 1.8rem;
  font-size: 1.5rem; font-weight: 700; color: #1a2b1f;
  text-align: center; line-height: 1.35; flex-shrink: 0;
  min-height: 85px; display: flex; align-items: center; justify-content: center;
}
.kq-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; min-height: 0;
}
.kq-opt {
  border-radius: 14px; overflow: hidden; display: flex; flex-direction: column;
  transition: opacity 0.45s, box-shadow 0.3s;
}
.kq-opt-body {
  flex: 1; display: flex; align-items: center; gap: 10px; padding: 12px 14px;
}
.kq-opt-icon { font-size: 1.5rem; flex-shrink: 0; }
.kq-opt-label { font-size: 0.92rem; font-weight: 600; color: #fff; flex: 1; line-height: 1.3; }
.kq-opt-pct {
  font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 700;
  color: #fff; min-width: 3.5ch; text-align: right; opacity: 0; transition: opacity 0.3s;
}
.kq-opt-pct.show { opacity: 1; }
.kq-opt-bar-row { height: 10px; background: rgba(0,0,0,0.25); flex-shrink: 0; }
.kq-opt-bar { height: 100%; background: rgba(255,255,255,0.45); transition: width 0.55s ease; }
.kq-opt[data-i="0"] { background: #d63031; }
.kq-opt[data-i="1"] { background: #0984e3; }
.kq-opt[data-i="2"] { background: #e17055; }
.kq-opt[data-i="3"] { background: #00b894; }
.kq-opt.dimmed { opacity: 0.22; }
.kq-opt.correct { box-shadow: 0 0 0 4px #fff, 0 0 0 7px rgba(255,255,255,0.3); }
.kq-lb {
  display: flex; flex-direction: row; gap: 8px; flex-shrink: 0; flex-wrap: wrap;
}
.kq-lb-row {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.1); border-radius: 10px;
  padding: 6px 12px; flex: 1; min-width: 140px;
  animation: fadeUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.kq-lb-rank { font-family:'DM Mono',monospace; font-size:0.75rem; color:rgba(255,255,255,0.45); width:20px; }
.kq-lb-name { flex:1; font-size:0.85rem; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.kq-lb-score { font-family:'DM Mono',monospace; font-size:0.85rem; color:var(--gold); }
.kq-hint {
  text-align: center; font-family: 'DM Mono', monospace; font-size: 0.75rem;
  color: rgba(255,255,255,0.25); flex-shrink: 0;
}

/* ───── GAME ───── */
#phase-game { flex-direction: column; background: #0d1a0f; color: #eef5f0; position: relative; }
.game-canvas-wrap { flex: 1; position: relative; overflow: hidden; }
canvas#game-canvas { width: 100%; height: 100%; display: block; }
.game-hud {
  position: absolute; top: 16px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 2rem; pointer-events: none;
}
.hud-card {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px; padding: 8px 20px; text-align: center; backdrop-filter: blur(8px);
}
.hud-name { font-size: 0.75rem; color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace; }
.hud-pos { font-size: 1.4rem; font-weight: 700; }
.countdown-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(13,26,15,0.85); z-index: 10;
}
.countdown-num { font-size: 8rem; font-weight: 700; color: var(--gold); animation: pulse 1s ease; }
@keyframes pulse { from { transform: scale(1.5); opacity:0; } to { transform: scale(1); opacity:1; } }

/* ───── PODIUM ───── */
#phase-podium {
  flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
  background: var(--bg);
}
.podium-title { font-size: 2.5rem; font-weight: 700; color: var(--green); }
.podium-wrap { display: flex; align-items: flex-end; gap: 1rem; }
.podium-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.podium-name { font-weight: 700; font-size: 1rem; }
.podium-block {
  width: 120px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px 8px 0 0; font-size: 2rem; font-weight: 700;
}
.p1 .podium-block { height: 180px; background: var(--gold); color: #fff; }
.p2 .podium-block { height: 130px; background: #aaa; color: #fff; }
.p3 .podium-block { height: 90px; background: #c87941; color: #fff; }
</style>
</head>
<body>

<!-- PHASE: WAITING -->
<div id="phase-waiting" class="active-phase">
  <div class="waiting-title">Kahoot mas feito com IA</div>
  <div class="waiting-sub">Faz scan do QR code para entrar</div>
  <div class="qr-box" id="qr-display">
    QR code aqui<br><br>
    <span id="player-url" style="font-size:0.7rem;word-break:break-all;color:#1a6644"></span>
  </div>
  <div class="player-count">jogadores: <span id="player-count-num">0</span></div>
  <div class="player-list" id="player-list"></div>
  <div style="font-size:0.8rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1rem;">
    admin: pressiona <kbd style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 6px;">Espaço</kbd> para avançar
  </div>
</div>

<!-- PHASE: QUIZ -->
<div id="phase-quiz">
  <div class="kq-topbar">
    <div class="kq-round-label" id="kq-round">Pergunta 1 / 7</div>
    <div class="kq-voted-pill" id="kq-voted">0 votaram</div>
  </div>
  <div class="kq-question-card" id="kq-question">Qual destas afirmações é verdadeira?</div>
  <div class="kq-grid" id="kq-options"></div>
  <div class="kq-lb" id="kq-lb" style="display:none"></div>
  <div class="kq-hint" id="kq-hint">espaço → revelar resposta</div>
</div>

<!-- PHASE: GAME -->
<div id="phase-game">
  <div class="game-canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div class="game-hud" id="game-hud"></div>
    <div class="countdown-overlay" id="countdown-overlay">
      <div class="countdown-num" id="countdown-num">3</div>
    </div>
  </div>
</div>

<!-- PHASE: PODIUM -->
<div id="phase-podium">
  <div class="podium-title">🏆 Vencedor!</div>
  <div class="podium-wrap" id="podium-wrap"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = localStorage.getItem('sb_url') || '';
const SUPABASE_KEY = localStorage.getItem('sb_key') || '';
const ROOM = 'townhall2025';
if (!SUPABASE_URL || !SUPABASE_KEY) {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:\'DM Mono\',monospace;font-size:0.9rem;color:#c0392b;text-align:center;padding:2rem;">Abre o admin.html no mesmo browser e liga ao Supabase primeiro.</div>';
  throw new Error('missing credentials');
}
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const channel = sb.channel(ROOM, { config: { broadcast: { self: false }, presence: { key: 'screen' } } });

let players = {};   // id -> { name, score, finished }
let phase = 'waiting';
let gameState = {};
let animFrame;

// ── Quiz (Kahoot) state
const rounds = [
  { trueIdx:2, options:["Eu já fiz voluntariado num abrigo de animais.","Eu acordo sempre antes das 7h, mesmo ao fim de semana.","Eu já trabalhei como bartender.","Eu nunca vi um filme da Marvel."] },
  { trueIdx:0, options:["Eu dei aulas de guitarra quando estava no 8.º ano.","Eu cheguei a tocar numa banda de covers em festivais de verão.","Eu sei tocar baixo e bateria além de guitarra.","Eu sou cinturão negro de Karate."] },
  { trueIdx:1, options:["Eu já visitei os 5 continentes.","Eu participei na gravação da banda sonora de um videojogo.","Eu vivi 6 meses no estrangeiro, em erasmus.","Eu fiz o Interrail sozinho com 17 anos."] },
  { trueIdx:3, options:["Faço uma dieta glúten free há 3 anos.","Eu pratico surf ao fim de semana.","Já fui presidente de uma juventude partidária.","Eu andei na escola com o António Silva do Benfica."] },
  { trueIdx:1, options:["Eu bebo chá todos os dias.","Eu sou dador de sangue.","Eu nunca fui aos EUA.","Eu faço parte de uma claque de futebol."] },
  { trueIdx:1, options:["Eu sei falar mandarim básico.","Eu já participei num hackathon na Lituânia.","Eu já tive um podcast.","Eu tenho um irmão mais novo."] },
  { trueIdx:0, options:["Eu não sei nadar.","Sou alérgico a amendoim.","Nunca saí de Viseu até fazer 18 anos.","Todos os anos faço ski no Natal."] }
];
let quizRound = 0;
let quizMode = 'question'; // 'question' | 'revealed'
let votes = {}; // { roundIdx: { playerId: chosenIdx } }

// ── DOM helpers
const $ = id => document.getElementById(id);
function showPhase(p) {
  phase = p;
  ['waiting','quiz','game','podium'].forEach(x => {
    $('phase-'+x).classList.toggle('active-phase', x === p);
  });
  channel.track({ type: 'admin', phase: p, quizRound, finalists: [] });
}

// ── Player URL
const playerURL = window.location.href.replace('screen.html','player.html') +
  '#url=' + encodeURIComponent(SUPABASE_URL) + '&key=' + encodeURIComponent(SUPABASE_KEY);
$('player-url').textContent = playerURL;
try {
  const box = $('qr-display');
  box.innerHTML = '';
  new QRCode(box, { text: playerURL, width: 160, height: 160, colorDark: '#1a2b1f', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
} catch(e) {
  $('qr-display').textContent = playerURL;
}

// ── Waiting: player chips
function renderWaiting() {
  const list = $('player-list');
  list.innerHTML = '';
  Object.values(players).forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.textContent = p.name;
    list.appendChild(chip);
  });
  $('player-count-num').textContent = Object.keys(players).length;
}

// ── Quiz: show question
function showQuestion(idx) {
  quizRound = idx;
  quizMode = 'question';
  if (!votes[idx]) votes[idx] = {};

  $('kq-round').textContent = `Pergunta ${idx+1} / ${rounds.length}`;
  updateVotedPill();
  $('kq-lb').style.display = 'none';
  $('kq-hint').textContent = 'espaço → revelar resposta';
  renderKOptions(idx, false);

  channel.send({ type:'broadcast', event:'quiz_question', payload:{ round: idx } });
  channel.track({ type: 'admin', phase: 'quiz', quizRound: idx, quizMode: 'question', finalists: [] });
}

function updateVotedPill() {
  const total = Object.keys(votes[quizRound] || {}).length;
  const playerCount = Object.keys(players).length;
  const pill = $('kq-voted');
  pill.textContent = `${total} / ${playerCount} votaram`;
  pill.classList.toggle('all', total > 0 && total >= playerCount);
}

function renderKOptions(idx, revealed) {
  const r = rounds[idx];
  const rv = votes[idx] || {};
  const total = Object.keys(rv).length;
  const icons = ['▲', '◆', '●', '■'];

  $('kq-options').innerHTML = '';
  r.options.forEach((opt, i) => {
    const cnt = Object.values(rv).filter(v => v === i).length;
    const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    const isCorrect = i === r.trueIdx;

    const div = document.createElement('div');
    div.className = 'kq-opt' + (revealed ? (isCorrect ? ' correct' : ' dimmed') : '');
    div.dataset.i = i;
    div.innerHTML = `
      <div class="kq-opt-body">
        <div class="kq-opt-icon">${icons[i]}</div>
        <div class="kq-opt-label">${opt}</div>
        <div class="kq-opt-pct${total > 0 ? ' show' : ''}">${total > 0 ? pct + '%' : ''}</div>
      </div>
      <div class="kq-opt-bar-row"><div class="kq-opt-bar" style="width:${pct}%"></div></div>
    `;
    $('kq-options').appendChild(div);
  });
}

function revealAnswer() {
  quizMode = 'revealed';

  // Update scores from votes
  const rv = votes[quizRound] || {};
  const r = rounds[quizRound];
  Object.entries(rv).forEach(([id, chosen]) => {
    if (chosen === r.trueIdx && players[id]) players[id].score++;
  });

  renderKOptions(quizRound, true);

  // Show leaderboard
  const sorted = Object.values(players).sort((a, b) => b.score - a.score);
  const lb = $('kq-lb');
  lb.style.display = 'flex';
  lb.innerHTML = sorted.slice(0, 5).map((p, i) => `
    <div class="kq-lb-row">
      <div class="kq-lb-rank">#${i+1}</div>
      <div class="kq-lb-name">${p.name}</div>
      <div class="kq-lb-score">${p.score} pts</div>
    </div>
  `).join('');

  const isLast = quizRound === rounds.length - 1;
  $('kq-hint').textContent = isLast ? 'espaço → iniciar corrida' : 'espaço → próxima pergunta';

  // Tell players the correct answer + updated scores
  const scores = {};
  Object.entries(players).forEach(([id, p]) => { scores[id] = p.score; });
  channel.send({ type:'broadcast', event:'quiz_reveal', payload:{ round: quizRound, correct: r.trueIdx, scores } });
  channel.track({ type: 'admin', phase: 'quiz', quizRound, quizMode: 'revealed', finalists: [] });
}

// ── Channel listeners
channel
  .on('broadcast', { event: 'join' }, ({ payload }) => {
    if (!players[payload.id]) players[payload.id] = { name: payload.name, score: 0, finished: false };
    if (phase === 'waiting') renderWaiting();
  })
  .on('broadcast', { event: 'vote' }, ({ payload }) => {
    const { id, name, round, chosen } = payload;
    if (!votes[round]) votes[round] = {};
    votes[round][id] = chosen;
    if (!players[id]) players[id] = { name, score: 0, finished: false };

    if (round === quizRound && quizMode === 'question') {
      updateVotedPill();
      renderKOptions(round, false);
    }
  })
  .on('broadcast', { event: 'input' }, ({ payload }) => {
    if (gameState.cars) {
      const car = gameState.cars.find(c => c.id === payload.id);
      if (car) { car.steerLeft = !!payload.left; car.steerRight = !!payload.right; car.boost = !!payload.boost; }
    }
  })
  .on('broadcast', { event: 'start_race' }, () => {
    if (phase === 'game') startRace();
  })
  .on('broadcast', { event: 'phase' }, ({ payload }) => {
    if (payload.phase === 'waiting') {
      players = {};
      votes = {};
      quizRound = 0;
      showPhase('waiting');
      renderWaiting();
    }
  })
  .on('presence', { event: 'leave' }, ({ leftPresences }) => {
    leftPresences.filter(p => p.type === 'player').forEach(p => {
      delete players[p.id];
    });
    if (phase === 'waiting') renderWaiting();
    if (phase === 'quiz') updateVotedPill();
  })
  .on('presence', { event: 'sync' }, () => {
    const all = Object.values(channel.presenceState()).flat();
    all.filter(p => p.type === 'player').forEach(p => {
      if (!players[p.id]) players[p.id] = { name: p.name, score: p.score || 0, finished: false };
    });
    if (phase === 'waiting') renderWaiting();
  })
  .subscribe();

// ── Phase transitions
function startGame() {
  const sorted = Object.entries(players).sort(([,a],[,b]) => b.score - a.score);
  const finalists = sorted.slice(0,5).map(([id,p]) => ({ id, name:p.name }));
  // Notify non-finalists
  channel.send({ type:'broadcast', event:'phase', payload:{ phase:'quiz_done', finalists: finalists.map(f=>f.id) } });
  // Notify finalists and start game
  showPhase('game');
  channel.send({ type:'broadcast', event:'phase', payload:{ phase:'game', finalists } });
  initGame(finalists);
}

// ── Keyboard admin controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (phase === 'waiting') {
      showPhase('quiz');
      showQuestion(0);
    } else if (phase === 'quiz' && quizMode === 'question') {
      revealAnswer();
    } else if (phase === 'quiz' && quizMode === 'revealed') {
      if (quizRound < rounds.length - 1) showQuestion(quizRound + 1);
      else startGame();
    } else if (phase === 'game' && !gameState.raceStarted) {
      startRace();
    } else if (phase === 'game' && gameState.raceStarted) {
      endGame();
    }
  }
});

// ── GAME ENGINE
const COLORS = ['#f5a623','#1a6644','#c0392b','#185FA5','#7c3aed'];
const TOTAL_LAPS = 10;

function angleDiff(a, b) {
  let d = a - b;
  while (d >  Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return d;
}

function initGame(finalists) {
  cancelAnimationFrame(animFrame);
  const canvas = $('game-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth  * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.offsetWidth;
  const H = () => canvas.offsetHeight;

  const CAR_W = 13, CAR_H = 24;
  const COLL_R   = 30;
  const TURN_RATE = 0.038;
  const MAX_SPD   = 3.2;
  const BOOST_SPD = 5.5;
  const ACCEL     = 0.10;

  function tg() {
    const w = W(), h = H();
    const cx = w / 2, cy = h / 2;
    const sl = w * 0.27;
    const R  = Math.min(h * 0.32, w * 0.20, 200);
    const hw = Math.min(52, R * 0.55);
    return { cx, cy, sl, R, hw, lx: cx - sl, rx: cx + sl };
  }

  function distCL(px, py, g) {
    const { cy, R, lx, rx } = g;
    if (px >= lx && px <= rx) {
      return Math.min(Math.abs(py - cy + R), Math.abs(py - cy - R));
    } else if (px > rx) {
      return Math.abs(Math.hypot(px - rx, py - cy) - R);
    } else {
      return Math.abs(Math.hypot(px - lx, py - cy) - R);
    }
  }

  function nearestCL(px, py, g) {
    const { cy, R, lx, rx } = g;
    if (px >= lx && px <= rx) {
      if (Math.abs(py - (cy - R)) < Math.abs(py - (cy + R))) {
        return { nx: px, ny: cy - R, tx: -1, ty: 0 };
      } else {
        return { nx: px, ny: cy + R, tx:  1, ty: 0 };
      }
    } else if (px > rx) {
      const a = Math.atan2(py - cy, px - rx);
      return { nx: rx + Math.cos(a) * R, ny: cy + Math.sin(a) * R,
               tx: Math.sin(a), ty: -Math.cos(a) };
    } else {
      const a = Math.atan2(py - cy, px - lx);
      return { nx: lx + Math.cos(a) * R, ny: cy + Math.sin(a) * R,
               tx: Math.sin(a), ty: -Math.cos(a) };
    }
  }

  function capsule(lx, rx, cy, r) {
    ctx.beginPath();
    ctx.moveTo(lx, cy - r);
    ctx.lineTo(rx, cy - r);
    ctx.arc(rx, cy, r, -Math.PI / 2, Math.PI / 2);
    ctx.lineTo(lx, cy + r);
    ctx.arc(lx, cy, r, Math.PI / 2, 3 * Math.PI / 2);
    ctx.closePath();
  }

  const g0 = tg();
  const n = finalists.length;
  const spacing = Math.min(CAR_H * 2 + 10, g0.sl * 0.55 / Math.max(n - 1, 1));
  gameState.cars = finalists.map((p, i) => {
    const x = g0.cx + 20 + (n - 1 - i) * spacing;
    return {
      id: p.id, name: p.name, color: COLORS[i % COLORS.length],
      x, y: g0.cy + g0.R,
      heading: 0,
      speed: 0,
      steerLeft: false, steerRight: false, boost: false,
      lapsDone: 0, prevX: x,
      finished: false, rank: null,
    };
  });
  gameState.raceStarted = false;
  gameState.finishOrder = [];
  gameState.ended = false;

  const hud = $('game-hud');
  hud.innerHTML = finalists.map((p, i) => `
    <div class="hud-card">
      <div class="hud-name" style="color:${COLORS[i % COLORS.length]}">${p.name}</div>
      <div class="hud-pos" id="hud-lap-${p.id}">0/${TOTAL_LAPS}</div>
    </div>
  `).join('');

  $('countdown-overlay').style.display = 'flex';
  $('countdown-num').textContent = '⏳';
  $('countdown-num').style.fontSize = '5rem';
  $('countdown-num').style.color = 'rgba(255,255,255,0.5)';

  function loop() {
    animFrame = requestAnimationFrame(loop);
    const w = W(), h = H();
    const g = tg();
    const { cx, cy, sl, R, hw, lx, rx } = g;

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#0d1a0f';
    ctx.fillRect(0, 0, w, h);

    capsule(lx, rx, cy, R + hw + 20);
    ctx.fillStyle = '#0a160b'; ctx.fill();

    capsule(lx, rx, cy, R + hw);
    ctx.fillStyle = '#2c3e30'; ctx.fill();

    capsule(lx, rx, cy, R - hw);
    ctx.fillStyle = '#0d1a0f'; ctx.fill();

    ctx.save();
    ctx.setLineDash([14, 12]);
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    capsule(lx, rx, cy, R); ctx.stroke();
    ctx.restore();

    for (const r of [R + hw, R - hw]) {
      capsule(lx, rx, cy, r);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 3; ctx.stroke();
    }

    const sfTop = cy + R - hw + 2, sfBot = cy + R + hw - 2, sqSz = 8, cols = 3;
    for (let col = 0; col < cols; col++) {
      for (let j = 0; j * sqSz < sfBot - sfTop; j++) {
        ctx.fillStyle = ((col + j) % 2 === 0) ? '#fff' : '#333';
        ctx.fillRect(cx - cols * sqSz / 2 + col * sqSz, sfTop + j * sqSz, sqSz, sqSz);
      }
    }

    const sorted = [...gameState.cars].sort((a, b) =>
      b.lapsDone !== a.lapsDone ? b.lapsDone - a.lapsDone : 0
    );
    const fsLB = Math.max(11, Math.min(15, (R - hw - 6) / sorted.length * 0.65));
    const listH = sorted.length * fsLB * 1.6;
    ctx.textAlign = 'center';
    sorted.forEach((car, i) => {
      const y = cy - listH / 2 + i * fsLB * 1.6 + fsLB;
      ctx.font = `bold ${fsLB}px DM Sans`;
      ctx.fillStyle = car.finished ? '#555' : car.color;
      ctx.fillText(`${i + 1}. ${car.name}  ${car.lapsDone}/${TOTAL_LAPS}`, cx, y);
    });

    if (gameState.raceStarted) {
      gameState.cars.forEach(car => {
        if (car.finished) return;

        if (car.steerLeft)  car.heading -= TURN_RATE;
        if (car.steerRight) car.heading += TURN_RATE;

        const onTrack = distCL(car.x, car.y, g) <= hw;
        const targetSpd = (car.boost ? BOOST_SPD : MAX_SPD) * (onTrack ? 1 : 0.35);
        car.speed += (targetSpd - car.speed) * ACCEL;

        car.x += Math.cos(car.heading) * car.speed;
        car.y += Math.sin(car.heading) * car.speed;

        const d2 = distCL(car.x, car.y, g);
        if (d2 > hw) {
          const cl = nearestCL(car.x, car.y, g);
          const pull = Math.min(0.28, (d2 - hw) / d2 * 0.45);
          car.x += (cl.nx - car.x) * pull;
          car.y += (cl.ny - car.y) * pull;
          car.heading += angleDiff(Math.atan2(cl.ty, cl.tx), car.heading) * 0.06;
        }

        if (Math.abs(car.y - (cy + R)) < hw && car.prevX < cx && car.x >= cx) {
          car.lapsDone++;
          const el = $(`hud-lap-${car.id}`);
          if (el) el.textContent = `${car.lapsDone}/${TOTAL_LAPS}`;
          channel.send({ type: 'broadcast', event: 'lap_update', payload: { id: car.id, lap: car.lapsDone } });
          if (car.lapsDone >= TOTAL_LAPS) {
            car.finished = true;
            gameState.finishOrder.push({ id: car.id, name: car.name });
            car.rank = gameState.finishOrder.length;
            if (el) el.textContent = `#${car.rank}`;
          }
        }
        car.prevX = car.x;
      });

      const active = gameState.cars.filter(c => !c.finished);
      for (let i = 0; i < active.length; i++) {
        for (let j = i + 1; j < active.length; j++) {
          const a = active[i], b = active[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);
          if (dist < COLL_R && dist > 0) {
            const push = (COLL_R - dist) / 2;
            const nx = dx / dist, ny = dy / dist;
            a.x -= nx * push; a.y -= ny * push;
            b.x += nx * push; b.y += ny * push;
          }
        }
      }
    }

    gameState.cars.forEach(car => {
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.heading + Math.PI / 2);

      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(-CAR_W - 2, -CAR_H - 2, (CAR_W + 2) * 2, (CAR_H + 2) * 2);

      ctx.fillStyle = car.finished ? '#444' : car.color;
      ctx.fillRect(-CAR_W, -CAR_H, CAR_W * 2, CAR_H * 2);

      ctx.fillStyle = 'rgba(180,220,255,0.6)';
      ctx.fillRect(-CAR_W + 3, -CAR_H + 4, (CAR_W - 3) * 2, 8);

      if (car.boost && !car.finished) {
        ctx.fillStyle = 'rgba(255,160,0,0.85)';
        ctx.fillRect(-5, CAR_H, 10, 10);
      }

      ctx.restore();

      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.textAlign = 'center';
      ctx.font = 'bold 11px DM Sans';
      ctx.lineWidth = 3;
      ctx.strokeStyle = 'rgba(0,0,0,0.65)';
      ctx.strokeText(car.name, 0, -CAR_H - 6);
      ctx.fillStyle = car.color;
      ctx.fillText(car.name, 0, -CAR_H - 6);
      ctx.restore();
    });

    if (gameState.raceStarted && gameState.cars.every(c => c.finished) && !gameState.ended) {
      gameState.ended = true;
      setTimeout(showPodium, 2000);
    }
  }

  loop();
}

function startRace() {
  if (!gameState.cars || gameState.raceStarted) return;
  let count = 3;
  $('countdown-overlay').style.display = 'flex';
  $('countdown-num').textContent = count;
  $('countdown-num').style.fontSize = '8rem';
  $('countdown-num').style.color = 'var(--gold)';
  const tick = setInterval(() => {
    count--;
    if (count > 0) {
      $('countdown-num').textContent = count;
      $('countdown-num').style.animation = 'none';
      void $('countdown-num').offsetWidth;
      $('countdown-num').style.animation = 'pulse 1s ease';
    } else if (count === 0) {
      $('countdown-num').textContent = 'GO!';
      $('countdown-num').style.color = '#1aad5a';
    } else {
      clearInterval(tick);
      $('countdown-overlay').style.display = 'none';
      gameState.raceStarted = true;
    }
  }, 1000);
}

function endGame() {
  cancelAnimationFrame(animFrame);
  showPodium();
}

function showPodium() {
  cancelAnimationFrame(animFrame);
  showPhase('podium');
  const order = gameState.finishOrder || [];
  const wrap = $('podium-wrap');
  const positions = order.slice(0, 3);
  const display = [positions[1], positions[0], positions[2]].filter(Boolean);
  const classes = { 0: 'p2', 1: 'p1', 2: 'p3' };
  const medals  = { 0: '🥈', 1: '🥇', 2: '🥉' };
  wrap.innerHTML = display.map((p, i) => p ? `
    <div class="podium-col ${classes[i]}">
      <div class="podium-name">${p.name}</div>
      <div class="podium-block">${medals[i]}</div>
    </div>
  ` : '').join('');
}

renderWaiting();
</script>
</body>
</html>
