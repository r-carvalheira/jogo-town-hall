<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Town Hall — Ecrã Principal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f3;
  --surface: #ffffff;
  --surface2: #eef0eb;
  --border: rgba(0,0,0,0.08);
  --green: #1a6644;
  --green2: #228c5a;
  --green-light: #e8f4ee;
  --text: #1a2b1f;
  --muted: #6b856f;
  --amber: #c97a00;
  --red: #c0392b;
  --gold: #f5a623;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

#phase-waiting, #phase-quiz, #phase-game, #phase-podium { display: none; width: 100vw; height: 100vh; }
.active-phase { display: flex !important; }

/* ───── WAITING ───── */
#phase-waiting {
  flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
  background: var(--bg);
}
.waiting-title { font-size: 3.5rem; font-weight: 700; color: var(--green); letter-spacing: -0.03em; }
.waiting-sub { font-size: 1.1rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.qr-box {
  width: 180px; height: 180px; background: var(--surface); border: 2px solid var(--border);
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; text-align: center; padding: 1rem;
}
.player-count { font-size: 1rem; font-family: 'DM Mono', monospace; color: var(--muted); }
.player-count span { color: var(--green); font-weight: 700; font-size: 1.4rem; }
.player-list { display: flex; flex-wrap: wrap; gap: 8px; max-width: 700px; justify-content: center; }
.player-chip {
  padding: 6px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 999px; font-size: 0.85rem; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from { opacity:0; transform: scale(0.6); } to { opacity:1; transform: scale(1); } }

/* ───── QUIZ LEADERBOARD ───── */
#phase-quiz { flex-direction: column; padding: 2rem; gap: 1.5rem; }
.quiz-header { display: flex; justify-content: space-between; align-items: center; }
.quiz-header h1 { font-size: 1.4rem; font-weight: 700; color: var(--green); }
.round-badge {
  padding: 6px 18px; background: var(--green); color: #fff;
  border-radius: 999px; font-family: 'DM Mono', monospace; font-size: 0.85rem;
}
.leaderboard { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
.lb-row {
  display: flex; align-items: center; gap: 16px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 20px; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  animation: slideIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideIn { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: none; } }
.lb-row.top1 { border-color: var(--gold); background: #fffbf0; }
.lb-rank { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; width: 32px; color: var(--muted); }
.lb-row.top1 .lb-rank { color: var(--gold); }
.lb-name { flex: 1; font-weight: 700; font-size: 1.1rem; }
.lb-score { font-family: 'DM Mono', monospace; font-size: 1.3rem; font-weight: 500; color: var(--green); }
.lb-bar-wrap { width: 200px; height: 6px; background: var(--surface2); border-radius: 3px; }
.lb-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.5s ease; }
.lb-row.top1 .lb-bar { background: var(--gold); }
.q-status { font-size: 0.9rem; color: var(--muted); font-family: 'DM Mono', monospace; text-align: center; }
.finalist-banner {
  background: var(--green); color: #fff; border-radius: 12px; padding: 1rem 1.5rem;
  text-align: center; font-weight: 700; font-size: 1.1rem; display: none;
}

/* ───── GAME ───── */
#phase-game { flex-direction: column; background: #0d1a0f; color: #eef5f0; position: relative; }
.game-canvas-wrap { flex: 1; position: relative; overflow: hidden; }
canvas#game-canvas { width: 100%; height: 100%; display: block; }
.game-hud {
  position: absolute; top: 16px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 2rem; pointer-events: none;
}
.hud-card {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px; padding: 8px 20px; text-align: center; backdrop-filter: blur(8px);
}
.hud-name { font-size: 0.75rem; color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace; }
.hud-pos { font-size: 1.4rem; font-weight: 700; }
.countdown-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(13,26,15,0.85); z-index: 10;
}
.countdown-num { font-size: 8rem; font-weight: 700; color: var(--gold); animation: pulse 1s ease; }
@keyframes pulse { from { transform: scale(1.5); opacity:0; } to { transform: scale(1); opacity:1; } }

/* ───── PODIUM ───── */
#phase-podium {
  flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
  background: var(--bg);
}
.podium-title { font-size: 2.5rem; font-weight: 700; color: var(--green); }
.podium-wrap { display: flex; align-items: flex-end; gap: 1rem; }
.podium-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.podium-name { font-weight: 700; font-size: 1rem; }
.podium-block {
  width: 120px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px 8px 0 0; font-size: 2rem; font-weight: 700;
}
.p1 .podium-block { height: 180px; background: var(--gold); color: #fff; }
.p2 .podium-block { height: 130px; background: #aaa; color: #fff; }
.p3 .podium-block { height: 90px; background: #c87941; color: #fff; }
</style>
</head>
<body>

<!-- PHASE: WAITING -->
<div id="phase-waiting" class="active-phase">
  <div class="waiting-title">Conheces o Rodrigo? 🎸</div>
  <div class="waiting-sub">Faz scan do QR code para entrar</div>
  <div class="qr-box" id="qr-display">
    QR code aqui<br><br>
    <span id="player-url" style="font-size:0.7rem;word-break:break-all;color:#1a6644"></span>
  </div>
  <div class="player-count">jogadores: <span id="player-count-num">0</span></div>
  <div class="player-list" id="player-list"></div>
  <div style="font-size:0.8rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1rem;">
    admin: pressiona <kbd style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 6px;">Espaço</kbd> para avançar
  </div>
</div>

<!-- PHASE: QUIZ LEADERBOARD -->
<div id="phase-quiz">
  <div class="quiz-header">
    <h1>Leaderboard em tempo real</h1>
    <div class="round-badge" id="round-badge">aguardar...</div>
  </div>
  <div class="finalist-banner" id="finalist-banner"></div>
  <div class="leaderboard" id="leaderboard"></div>
  <div class="q-status" id="q-status">Os jogadores estão a responder...</div>
</div>

<!-- PHASE: GAME -->
<div id="phase-game">
  <div class="game-canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div class="game-hud" id="game-hud"></div>
    <div class="countdown-overlay" id="countdown-overlay">
      <div class="countdown-num" id="countdown-num">3</div>
    </div>
  </div>
</div>

<!-- PHASE: PODIUM -->
<div id="phase-podium">
  <div class="podium-title">🏆 Vencedor!</div>
  <div class="podium-wrap" id="podium-wrap"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = localStorage.getItem('sb_url') || '';
const SUPABASE_KEY = localStorage.getItem('sb_key') || '';
const ROOM = 'townhall2025';
if (!SUPABASE_URL || !SUPABASE_KEY) {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:\'DM Mono\',monospace;font-size:0.9rem;color:#c0392b;text-align:center;padding:2rem;">Abre o admin.html no mesmo browser e liga ao Supabase primeiro.</div>';
  throw new Error('missing credentials');
}
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const channel = sb.channel(ROOM, { config: { broadcast: { self: false }, presence: { key: 'screen' } } });

let players = {};   // id -> { name, score, finished }
let phase = 'waiting';
let gameState = {};
let animFrame;

// ── DOM helpers
const $ = id => document.getElementById(id);
function showPhase(p) {
  phase = p;
  ['waiting','quiz','game','podium'].forEach(x => {
    $('phase-'+x).classList.toggle('active-phase', x === p);
  });
}

// ── Player URL com credenciais no hash (nunca vai ao servidor)
const playerURL = window.location.href.replace('screen.html','player.html') +
  '#url=' + encodeURIComponent(SUPABASE_URL) + '&key=' + encodeURIComponent(SUPABASE_KEY);
$('player-url').textContent = playerURL;
QRCode.toCanvas(document.createElement('canvas'), playerURL, { width: 160, margin: 1 }, (err, c) => {
  if (!err) { const box = $('qr-display'); box.innerHTML = ''; box.style.padding = '10px'; box.appendChild(c); }
});

// ── Leaderboard render
function renderLeaderboard() {
  const sorted = Object.values(players).sort((a,b) => b.score - a.score);
  const max = sorted[0]?.score || 1;
  const lb = $('leaderboard');
  lb.innerHTML = '';
  sorted.slice(0,10).forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row' + (i===0?' top1':'');
    row.innerHTML = `
      <div class="lb-rank">#${i+1}</div>
      <div class="lb-name">${p.name}</div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${(p.score/max)*100}%"></div></div>
      <div class="lb-score">${p.score}</div>
    `;
    lb.appendChild(row);
  });
}

// ── Waiting: player chips
function renderWaiting() {
  const list = $('player-list');
  list.innerHTML = '';
  Object.values(players).forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.textContent = p.name;
    list.appendChild(chip);
  });
  $('player-count-num').textContent = Object.keys(players).length;
}

// ── Channel listeners
channel
  .on('broadcast', { event: 'join' }, ({ payload }) => {
    players[payload.id] = { name: payload.name, score: 0, finished: false };
    if (phase === 'waiting') renderWaiting();
    renderLeaderboard();
  })
  .on('broadcast', { event: 'score' }, ({ payload }) => {
    if (players[payload.id]) {
      players[payload.id].score = payload.score;
      players[payload.id].finished = payload.finished || false;
    }
    renderLeaderboard();
    const total = Object.keys(players).length;
    const done = Object.values(players).filter(p => p.finished).length;
    $('q-status').textContent = `Respondidas: ${done} / ${total}`;
    if (done === total && total > 0) {
      showFinalists();
    }
  })
  .on('broadcast', { event: 'tilt' }, ({ payload }) => {
    if (gameState.boats) {
      const boat = gameState.boats.find(b => b.id === payload.id);
      if (boat) boat.targetTilt = Math.max(-1, Math.min(1, payload.tilt));
    }
  })
  .subscribe();

// ── Phase transitions
function showFinalists() {
  const sorted = Object.values(players).sort((a,b)=>b.score-a.score);
  const finalists = sorted.slice(0,5);
  const banner = $('finalist-banner');
  banner.textContent = '🏁 Finalistas: ' + finalists.map(p=>p.name).join('  ·  ');
  banner.style.display = 'block';
  // notify players
  channel.send({ type:'broadcast', event:'phase', payload:{ phase:'quiz_done', finalists: finalists.map(p=>p.id) } });
}

function startGame() {
  const sorted = Object.values(players).sort((a,b)=>b.score-a.score);
  const finalists = sorted.slice(0,5);
  showPhase('game');
  channel.send({ type:'broadcast', event:'phase', payload:{ phase:'game', finalists: finalists.map(p=>({id:p.id,name:p.name})) } });
  initGame(finalists);
}

// ── Keyboard admin controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (phase === 'waiting') { showPhase('quiz'); channel.send({type:'broadcast',event:'phase',payload:{phase:'quiz'}}); }
    else if (phase === 'quiz') startGame();
    else if (phase === 'game') endGame();
  }
});

// ── GAME ENGINE
const COLORS = ['#1a6644','#c97a00','#c0392b','#185FA5','#7c3aed'];

function initGame(finalists) {
  const canvas = $('game-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.offsetWidth * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.offsetWidth;
  const H = () => canvas.offsetHeight;
  const TRACK_H = 80;

  gameState.boats = finalists.map((p, i) => ({
    id: p.id,
    name: p.name,
    color: COLORS[i],
    x: 120,
    y: TRACK_H * i + TRACK_H / 2,
    targetTilt: 0,
    tilt: 0,
    speed: 0,
    finished: false,
    finishTime: null,
    rank: null,
  }));
  gameState.finishX = null;
  gameState.finishOrder = [];
  gameState.started = false;
  gameState.startTime = null;

  // countdown
  let count = 3;
  $('countdown-overlay').style.display = 'flex';
  const tick = setInterval(() => {
    count--;
    if (count > 0) {
      $('countdown-num').textContent = count;
      $('countdown-num').style.animation = 'none';
      void $('countdown-num').offsetWidth;
      $('countdown-num').style.animation = 'pulse 1s ease';
    } else {
      clearInterval(tick);
      $('countdown-overlay').style.display = 'none';
      gameState.started = true;
      gameState.startTime = Date.now();
    }
  }, 1000);

  // HUD
  const hud = $('game-hud');
  hud.innerHTML = finalists.map((p,i)=>`
    <div class="hud-card">
      <div class="hud-name" style="color:${COLORS[i]}">${p.name}</div>
      <div class="hud-pos" id="hud-pos-${p.id}">—</div>
    </div>
  `).join('');

  // wave particles
  const waves = Array.from({length:40},()=>({
    x: Math.random()*2000, y: Math.random()*600,
    r: Math.random()*3+1, speed: Math.random()*0.5+0.2, a: Math.random()
  }));

  let finishX;

  function loop() {
    animFrame = requestAnimationFrame(loop);
    const w = W(), h = H();
    finishX = w - 100;
    gameState.finishX = finishX;

    // bg
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#0d1a0f';
    ctx.fillRect(0, 0, w, h);

    // tracks
    finalists.forEach((p, i) => {
      const ty = TRACK_H * i;
      ctx.fillStyle = i%2===0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.04)';
      ctx.fillRect(0, ty, w, TRACK_H);
      // lane label
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = '12px DM Mono';
      ctx.fillText(p.name, 10, ty + TRACK_H/2 + 4);
    });

    // finish line
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.setLineDash([8,6]);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(finishX, 0); ctx.lineTo(finishX, h); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '13px DM Mono';
    ctx.fillText('CHEGADA', finishX - 35, 16);

    // waves
    waves.forEach(wv => {
      wv.x -= wv.speed * 0.8;
      if (wv.x < -10) wv.x = w + 10;
      ctx.beginPath();
      ctx.arc(wv.x, wv.y % h, wv.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(26,173,114,${0.06 + wv.a*0.08})`;
      ctx.fill();
    });

    // boats
    gameState.boats.forEach((boat, i) => {
      if (!gameState.started) return;
      boat.tilt += (boat.targetTilt - boat.tilt) * 0.08;
      if (!boat.finished) {
        const baseSpeed = 1.2;
        boat.speed = baseSpeed + (1 - Math.abs(boat.tilt)) * 2.2;
        boat.x += boat.speed;
      }

      // check finish
      if (!boat.finished && boat.x >= finishX) {
        boat.finished = true;
        boat.finishTime = Date.now() - gameState.startTime;
        gameState.finishOrder.push({ id: boat.id, name: boat.name, time: boat.finishTime });
        boat.rank = gameState.finishOrder.length;
        const posEl = $('hud-pos-'+boat.id);
        if (posEl) posEl.textContent = '#' + boat.rank;
      }

      const bx = boat.x, by = boat.y;
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(boat.tilt * 0.3);

      // boat body
      ctx.beginPath();
      ctx.moveTo(-30, 12);
      ctx.lineTo(30, 8);
      ctx.lineTo(38, 0);
      ctx.lineTo(30, -8);
      ctx.lineTo(-30, -12);
      ctx.closePath();
      ctx.fillStyle = boat.color;
      ctx.fill();

      // sail
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(0, -38);
      ctx.lineTo(22, -14);
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fill();

      // wake
      ctx.beginPath();
      ctx.moveTo(-30, 6);
      for (let j=1;j<=5;j++) {
        ctx.lineTo(-30-j*12, 6+j*3*(j%2?1:-1));
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.restore();
    });

    // if all done
    if (gameState.started && gameState.boats.every(b=>b.finished) && !gameState.ended) {
      gameState.ended = true;
      setTimeout(showPodium, 1500);
    }
  }

  loop();
}

function endGame() {
  cancelAnimationFrame(animFrame);
  showPodium();
}

function showPodium() {
  cancelAnimationFrame(animFrame);
  showPhase('podium');
  const order = gameState.finishOrder || [];
  const wrap = $('podium-wrap');
  const positions = order.slice(0,3);
  const display = [positions[1], positions[0], positions[2]].filter(Boolean);

  const classes = { 0: 'p2', 1: 'p1', 2: 'p3' };
  const medals = { 0: '🥈', 1: '🥇', 2: '🥉' };

  wrap.innerHTML = display.map((p,i) => p ? `
    <div class="podium-col ${classes[i]}">
      <div class="podium-name">${p.name}</div>
      <div class="podium-block">${medals[i]}</div>
    </div>
  ` : '').join('');
}

// init waiting phase display
renderWaiting();
</script>
</body>
</html>
