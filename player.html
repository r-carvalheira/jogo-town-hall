<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Town Hall — Jogador</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6f3; --surface: #fff; --surface2: #eef0eb;
  --border: rgba(0,0,0,0.09); --green: #1a6644; --green2: #228c5a;
  --text: #1a2b1f; --muted: #6b856f; --danger: #c0392b; --gold: #f5a623;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

.screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; gap: 1.5rem; }
.screen.active { display: flex; }

/* ─── REGISTER ─── */
.reg-title { font-size: 1.8rem; font-weight: 700; color: var(--green); text-align: center; }
.reg-sub { color: var(--muted); font-size: 0.9rem; text-align: center; font-family: 'DM Mono', monospace; }
.reg-input {
  width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--border);
  background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 1.1rem;
  outline: none; text-align: center; transition: border-color 0.2s;
}
.reg-input:focus { border-color: var(--green); }
.btn {
  width: 100%; padding: 16px; border-radius: 12px; border: none;
  background: var(--green); color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
}
.btn:active { opacity: 0.8; }
.btn:disabled { opacity: 0.4; cursor: default; }

/* ─── WAITING ROOM ─── */
.wait-icon { font-size: 3rem; }
.wait-title { font-size: 1.3rem; font-weight: 700; color: var(--green); text-align: center; }
.wait-name { font-size: 1rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.wait-anim {
  display: flex; gap: 6px;
}
.wait-anim span {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  animation: wb 1.2s infinite;
}
.wait-anim span:nth-child(2) { animation-delay: 0.2s; }
.wait-anim span:nth-child(3) { animation-delay: 0.4s; }
@keyframes wb { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

/* ─── QUIZ ─── */
.quiz-wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 1.2rem; }
.q-progress { height: 4px; background: var(--surface2); border-radius: 2px; }
.q-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
.q-round { font-size: 0.75rem; font-family: 'DM Mono', monospace; color: var(--muted); text-align: center; }
.q-text { font-size: 1.05rem; font-weight: 700; text-align: center; line-height: 1.5; color: var(--text); }
.q-label { font-size: 0.8rem; color: var(--muted); text-align: center; font-family: 'DM Mono', monospace; }
.options { display: flex; flex-direction: column; gap: 10px; }
.opt {
  padding: 14px 16px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
  cursor: pointer; transition: all 0.18s; color: var(--text); text-align: left;
  display: flex; align-items: center; gap: 10px;
}
.opt:active:not(:disabled) { transform: scale(0.98); }
.opt:hover:not(:disabled) { border-color: var(--green); }
.opt .opt-l {
  width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); flex-shrink: 0;
}
.opt.correct { border-color: var(--green2); background: #e8f4ee; }
.opt.correct .opt-l { background: var(--green); border-color: var(--green); color: #fff; }
.opt.wrong { border-color: var(--danger); background: #fdecea; }
.opt.wrong .opt-l { background: var(--danger); border-color: var(--danger); color: #fff; }
.opt:disabled { cursor: default; }
.score-display {
  text-align: center; font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--muted);
}
.score-display span { color: var(--green); font-size: 1.1rem; font-weight: 500; }

/* ─── NOT FINALIST ─── */
.nf-score { font-size: 3rem; font-weight: 700; color: var(--green); }
.nf-label { font-size: 0.85rem; font-family: 'DM Mono', monospace; color: var(--muted); }

/* ─── BUTTON CONTROLLER ─── */
#screen-controller {
  display: none; position: fixed; inset: 0; background: #0d1a0f; color: #eef5f0;
  flex-direction: column; align-items: center; justify-content: center; gap: 1.4rem;
}
#screen-controller.active { display: flex; }
.ctrl-name { font-size: 1.4rem; font-weight: 700; color: #eef5f0; }
.ctrl-lap { font-family: 'DM Mono', monospace; font-size: 1.1rem; color: var(--gold); }
.ctrl-btns { display: flex; align-items: center; gap: 1.5rem; }
.ctrl-btn {
  width: 110px; height: 110px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.07); color: #eef5f0;
  font-size: 2.8rem; display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  touch-action: none; -webkit-tap-highlight-color: transparent;
  transition: background 0.08s, transform 0.08s;
}
.ctrl-btn.pressed { background: rgba(255,255,255,0.22); transform: scale(0.93); }
.ctrl-boost {
  width: 80px; height: 80px;
  border-color: var(--gold); background: rgba(245,166,35,0.12); color: var(--gold);
  font-size: 2rem;
}
.boost-bar-wrap { width: 220px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; }
.boost-bar { height: 100%; background: var(--gold); border-radius: 4px; }
.ctrl-status { font-size: 0.8rem; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<!-- REGISTER -->
<div class="screen active" id="screen-register">
  <div class="reg-title">Olá! 👋</div>
  <div class="reg-sub">Escreve o teu nome para entrar no quiz</div>
  <input class="reg-input" id="name-input" type="text" placeholder="O teu nome..." maxlength="20" />
  <div id="name-error" style="font-size:0.82rem;color:var(--danger);font-family:'DM Mono',monospace;text-align:center;min-height:1.2rem;"></div>
  <button class="btn" id="join-btn" onclick="joinGame()">Entrar no jogo</button>
</div>

<!-- WAITING ROOM -->
<div class="screen" id="screen-wait">
  <div class="wait-icon">🎸</div>
  <div class="wait-title">Estás dentro!</div>
  <div class="wait-name" id="wait-name"></div>
  <div class="wait-anim"><span></span><span></span><span></span></div>
  <div style="font-size:0.85rem;color:var(--muted);text-align:center;">A aguardar que o quiz comece...</div>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-wrap">
    <div class="q-progress"><div class="q-fill" id="q-fill" style="width:0%"></div></div>
    <div class="q-round" id="q-round">Ronda 1 de 6</div>
    <div class="q-text" id="q-text">Qual é a verdadeira?</div>
    <div class="q-label">Escolhe a afirmação verdadeira</div>
    <div class="options" id="options"></div>
    <div class="score-display">Pontos: <span id="score-disp">0</span></div>
  </div>
</div>

<!-- NOT A FINALIST -->
<div class="screen" id="screen-done">
  <div class="nf-score" id="done-score">0</div>
  <div class="nf-label">pontos</div>
  <div style="font-size:1.1rem;font-weight:700;color:var(--text);margin-top:0.5rem;" id="done-msg"></div>
  <div style="font-size:0.85rem;color:var(--muted);text-align:center;margin-top:0.5rem;">
    Segue o jogo no ecrã principal!
  </div>
</div>

<!-- BUTTON CONTROLLER -->
<div id="screen-controller">
  <div class="ctrl-name" id="ctrl-name"></div>
  <div class="ctrl-lap" id="ctrl-lap">Volta 0 / 10</div>
  <div class="ctrl-btns">
    <button class="ctrl-btn" id="btn-left">◀</button>
    <button class="ctrl-btn ctrl-boost" id="btn-boost">⚡</button>
    <button class="ctrl-btn" id="btn-right">▶</button>
  </div>
  <div class="boost-bar-wrap"><div class="boost-bar" id="boost-bar" style="width:100%"></div></div>
  <div class="ctrl-status" id="ctrl-status">A aguardar arranque...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _hash = new URLSearchParams(window.location.hash.slice(1));
const SUPABASE_URL = _hash.get('url') || '';
const SUPABASE_KEY = _hash.get('key') || '';
const ROOM = 'townhall2025';
if (!SUPABASE_URL || !SUPABASE_KEY) {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:2rem;font-family:\'DM Sans\',sans-serif;color:#c0392b;font-size:1rem;">Link inválido.<br><br>Pede ao admin para gerar o QR code novamente.</div>';
  throw new Error('missing credentials in URL hash');
}
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let myId = null, myName = '', myScore = 0, currentRound = 0, answered = false;
let isFinalist = false;
let channel = null;

const $ = id => document.getElementById(id);

function uid() { return Math.random().toString(36).slice(2,10); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id)?.classList.add('active');
  $('screen-controller').classList.remove('active');
}

function showController() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('screen-controller').classList.add('active');
}

// ── Rounds data (same as screen)
const rounds = [
  { trueIdx:2, options:["Eu já fiz voluntariado num abrigo de animais.","Eu acordo sempre antes das 7h, mesmo ao fim de semana.","Eu já trabalhei como bartender.","Eu nunca vi um filme da Marvel."] },
  { trueIdx:0, options:["Eu dei aulas de guitarra quando estava no 8.º ano.","Eu cheguei a tocar numa banda de covers em festivais de verão.","Eu sei tocar baixo e bateria além de guitarra.","Eu sou cinturão negro de Karate."] },
  { trueIdx:1, options:["Eu já visitei os 5 continentes.","Eu participei na gravação da banda sonora de um videojogo.","Eu vivi 6 meses no estrangeiro, em erasmus.","Eu fiz o Interrail sozinho com 17 anos."] },
  { trueIdx:3, options:["Faço uma dieta glúten free há 3 anos.","Eu pratico surf ao fim de semana.","Já fui presidente de uma juventude partidária.","Eu andei na escola com o António Silva do Benfica."] },
  { trueIdx:1, options:["Eu bebo chá todos os dias.","Eu sou dador de sangue.","Eu nunca fui aos EUA.","Eu faço parte de uma claque de futebol."] },
  { trueIdx:1, options:["Eu sei falar mandarim básico.","Eu já participei num hackathon na Lituânia.","Eu já tive um podcast.","Eu tenho um irmão mais novo."] },
  { trueIdx:0, options:["Eu não sei nadar.","Sou alérgico a amendoim.","Nunca saí de Viseu até fazer 18 anos.","Todos os anos faço ski no Natal."] }
];


function joinGame() {
  const name = $('name-input').value.trim();
  if (!name) return;
  // Restaurar ID da sessão anterior para que o sistema nos reconheça
  myId = sessionStorage.getItem('th_id') || uid();
  myName = name;
  $('join-btn').disabled = true;
  sessionStorage.setItem('th_id', myId);
  sessionStorage.setItem('th_name', myName);

  let presenceChecked = false;
  channel = sb.channel(ROOM, { config: { broadcast: { self: false } } });
  channel
    .on('broadcast', { event: 'phase' }, ({ payload }) => {
      handlePhase(payload);
    })
    .on('broadcast', { event: 'lap_update' }, ({ payload }) => {
      if (payload.id === myId) $('ctrl-lap').textContent = `Volta ${payload.lap} / 10`;
    })
    .on('presence', { event: 'sync' }, () => {
      const all = Object.values(channel.presenceState()).flat();

      // Primeira sync: verificar se o nome já está em uso
      if (!presenceChecked) {
        presenceChecked = true;
        const nameTaken = all.some(p =>
          p.type === 'player' &&
          p.name.toLowerCase() === myName.toLowerCase() &&
          p.id !== myId
        );
        if (nameTaken) {
          channel.unsubscribe();
          channel = null;
          sessionStorage.removeItem('th_id');
          $('join-btn').disabled = false;
          $('name-error').textContent = 'Este nome já está em uso. Escolhe outro.';
          $('name-input').value = '';
          $('name-input').focus();
          showScreen('screen-register');
          return;
        }
      }

      // Sincronizar fase atual (útil para quem entra tarde ou volta após refresh)
      const admin = all.find(p => p.type === 'admin');
      if (!admin || admin.phase === 'waiting') return;
      const onPassiveScreen = $('screen-wait').classList.contains('active') ||
                              $('screen-register').classList.contains('active');
      if (onPassiveScreen) handlePhase({ phase: admin.phase, finalists: admin.finalists });
    })
    .subscribe(() => {
      channel.track({ type: 'player', id: myId, name: myName });
      channel.send({ type:'broadcast', event:'join', payload:{ id:myId, name:myName } });
      $('wait-name').textContent = myName;
      showScreen('screen-wait');
    });
}

function handlePhase(payload) {
  if (payload.phase === 'quiz') {
    // Restaurar progresso de sessão anterior (rejoin); 0 para quem entra de novo
    myScore = parseInt(sessionStorage.getItem('th_score') || '0');
    currentRound = parseInt(sessionStorage.getItem('th_round') || '0');
    showScreen('screen-quiz');
    loadRound(currentRound);
  } else if (payload.phase === 'quiz_done') {
    const finalistIds = payload.finalists || [];
    isFinalist = finalistIds.includes(myId);
    if (!isFinalist) {
      $('done-score').textContent = myScore;
      $('done-msg').textContent = myScore >= 4 ? 'Muito bem!' : myScore >= 2 ? 'Boa tentativa!' : 'Para a próxima! 😄';
      showScreen('screen-done');
    }
  } else if (payload.phase === 'game') {
    const finalists = payload.finalists || [];
    const me = finalists.find(f => f.id === myId);
    if (me && !isFinalist) {
      isFinalist = true;
      $('ctrl-name').textContent = me.name;
      showController();
      setupController();
    }
  } else if (payload.phase === 'waiting') {
    // Reset completo — limpar sessão de progresso
    sessionStorage.removeItem('th_score');
    sessionStorage.removeItem('th_round');
    isFinalist = false;
    showScreen('screen-register');
  }
}

function loadRound(idx) {
  if (idx >= rounds.length) { finishQuiz(); return; }
  sessionStorage.setItem('th_round', idx);
  const r = rounds[idx];
  answered = false;
  $('q-round').textContent = `Ronda ${idx+1} de ${rounds.length}`;
  $('q-fill').style.width = `${((idx)/rounds.length)*100}%`;
  $('q-text').textContent = 'Qual destas afirmações é verdadeira?';
  $('score-disp').textContent = myScore;
  const labels = ['A','B','C','D'];
  const opts = $('options');
  opts.innerHTML = '';
  r.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-l">${labels[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, idx);
    opts.appendChild(btn);
  });
}

function selectAnswer(chosen, roundIdx) {
  if (answered) return;
  answered = true;
  const r = rounds[roundIdx];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const correct = chosen === r.trueIdx;
  if (correct) myScore++;
  sessionStorage.setItem('th_score', myScore);
  btns[r.trueIdx].classList.add('correct');
  if (!correct) btns[chosen].classList.add('wrong');
  $('score-disp').textContent = myScore;
  // send score update
  const finished = roundIdx === rounds.length - 1;
  channel.send({ type:'broadcast', event:'score', payload:{ id:myId, name:myName, score:myScore, finished } });
  setTimeout(() => {
    if (roundIdx < rounds.length - 1) loadRound(roundIdx + 1);
    else finishQuiz();
  }, 1800);
}

function finishQuiz() {
  $('q-fill').style.width = '100%';
  // Send final score
  channel.send({ type:'broadcast', event:'score', payload:{ id:myId, name:myName, score:myScore, finished:true } });
}

// ── BUTTON CONTROLLER
function setupController() {
  const inputState = { left: false, right: false, boost: false };
  let boostEnergy = 100;

  function sendInput() {
    if (!channel) return;
    channel.send({ type: 'broadcast', event: 'input', payload: { id: myId, ...inputState } });
  }

  function bindBtn(btnId, key) {
    const btn = $(btnId);
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      inputState[key] = true;
      btn.classList.add('pressed');
      sendInput();
    });
    ['pointerup', 'pointercancel', 'pointerleave'].forEach(ev => {
      btn.addEventListener(ev, e => {
        e.preventDefault();
        if (inputState[key]) { inputState[key] = false; btn.classList.remove('pressed'); sendInput(); }
      });
    });
  }

  bindBtn('btn-left', 'left');
  bindBtn('btn-right', 'right');
  bindBtn('btn-boost', 'boost');

  // Boost energy bar
  setInterval(() => {
    if (inputState.boost && boostEnergy > 0) {
      boostEnergy = Math.max(0, boostEnergy - 2.5);
      if (boostEnergy <= 0) {
        inputState.boost = false;
        $('btn-boost').classList.remove('pressed');
        sendInput();
      }
    } else if (!inputState.boost) {
      boostEnergy = Math.min(100, boostEnergy + 0.8);
    }
    $('boost-bar').style.width = boostEnergy + '%';
  }, 50);

  $('ctrl-status').textContent = '◀ esquerda  ⚡ boost  ▶ direita';
}

$('name-input').addEventListener('keydown', e => { if(e.key==='Enter') joinGame(); });
$('name-input').addEventListener('input', () => { $('name-error').textContent = ''; });

// Auto-rejoin se houver sessão activa (refresh acidental)
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('th_name');
  if (saved && SUPABASE_URL) {
    $('name-input').value = saved;
    setTimeout(joinGame, 300);
  }
});
</script>
</body>
</html>
